<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Nouveau message de contact</title>
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .header { background: #0A84FF; color: white; padding: 20px; text-align: center; }
        .content { padding: 20px; background: #f9f9f9; }
        .field { margin-bottom: 15px; }
        .label { font-weight: bold; color: #0A84FF; }
        .message { background: white; padding: 15px; border-left: 4px solid #0A84FF; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Nouveau message de contact</h1>
        </div>
        <div class="content">
            <div class="field">
                <span class="label">Nom:</span> {{ name }}
            </div>
            <div class="field">
                <span class="label">Email:</span> {{ email }}
            </div>
            <div class="field">
                <span class="label">Sujet:</span> {{ subject }}
            </div>
            <div class="field">
                <span class="label">Message:</span>
                <div class="message">{{ message|linebreaks }}</div>
            </div>
        </div>
    </div>
</body>
</html>
