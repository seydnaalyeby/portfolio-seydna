<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Confirmation de votre message</title>
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .header { background: #0A84FF; color: white; padding: 20px; text-align: center; }
        .content { padding: 20px; background: #f9f9f9; }
        .footer { text-align: center; padding: 20px; color: #666; font-size: 14px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Message reçu!</h1>
        </div>
        <div class="content">
            <p>Bonjour {{ name }},</p>
            <p>Merci de m'avoir contacté. J'ai bien reçu votre message avec le sujet "<strong>{{ subject }}</strong>" et vous répondrai dans les plus brefs délais.</p>
            <p>Cordialement,<br>Seydna Aly Eby</p>
        </div>
        <div class="footer">
            <p>Cet email a été envoyé automatiquement. Merci de ne pas y répondre.</p>
        </div>
    </div>
</body>
</html>
