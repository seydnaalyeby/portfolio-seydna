services:
  - type: web
    name: portfolio-backend
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn portfolio.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "localhost,127.0.0.1"
      - key: PYTHON_VERSION
        value: "3.11.0"
